global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8000"]

  - job_name: "product-service"
    static_configs:
      - targets: ["product-service:8001"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8002"]

  - job_name: "dispatcher"
    static_configs:
      - targets: ["dispatcher:8003"]