version: "3.9"

networks:
  microservices-net:
    driver: bridge

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - microservices-net
    volumes:
      - mongo-data:/data/db

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8000:8000"
    networks:
      - microservices-net
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8001:8001"
    networks:
      - microservices-net
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8002:8002"
    networks:
      - microservices-net
    depends_on:
      - mongodb
      - product-service
    environment:
      - MONGO_URI=mongodb://mongodb:27017/

  dispatcher:
    build: ./dispatcher
    container_name: dispatcher
    ports:
      - "8003:8003"
    networks:
      - microservices-net
    depends_on:
      - auth-service
      - product-service
      - order-service

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - microservices-net
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - microservices-net
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  mongo-data:
  grafana-data:


