version: "3.9"

networks:
  public-net:
    driver: bridge
  private-net:
    driver: bridge
    internal: true

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    networks:
      - private-net
    volumes:
      - mongo-data:/data/db

  auth-service:
    build: ./auth-service
    container_name: auth-service
    networks:
      - private-net
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/

  product-service:
    build: ./product-service
    container_name: product-service
    networks:
      - private-net
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/

  order-service:
    build: ./order-service
    container_name: order-service
    networks:
      - private-net
    depends_on:
      - mongodb
      - product-service
    environment:
      - MONGO_URI=mongodb://mongodb:27017/

  dispatcher:
    build: ./dispatcher
    container_name: dispatcher
    ports:
      - "8003:8003"
    networks:
      - public-net
      - private-net
    depends_on:
      - auth-service
      - product-service
      - order-service

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    networks:
      - private-net
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - public-net
      - private-net
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

volumes:
  mongo-data:
  grafana-data:
